<div class="min-h-screen flex items-center justify-center bg-gray-100">
	<mat-card class="w-full max-w-md p-6 bg-white rounded-lg shadow-lg">
		<mat-card-header class="mb-4">
			<mat-card-title class="text-2xl font-bold">Configuracion del TFA</mat-card-title>
		</mat-card-header>
		<mat-card-content>
			<div class="flex items-center justify-center mb-4">
				<app-qr-code class="w-full" [url]="qrURL"></app-qr-code>
			</div>
			<p class="text-center text-gray-600">Escanea el codigo QR con tu aplicacion de autenticacion para configurar el TFA</p>
			<p class="text-center text-gray-600">Cuando hayas configurado el TFA, presiona continuar</p>
			<button mat-flat-button color="accent" class="w-full" (click)="openDialog()">Continue</button>
		</mat-card-content>
	</mat-card>
</div>
