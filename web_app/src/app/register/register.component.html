<div class="min-h-screen flex items-center justify-center bg-gray-100">
	<mat-card class="w-full max-w-md p-6 bg-white rounded-lg shadow-lg">
		<mat-card-header class="mb-4">
			<mat-card-title class="text-2xl font-bold">Registro de usuarios</mat-card-title>
		</mat-card-header>
		<mat-card-content>
			<form [formGroup]="form" (ngSubmit)="submit()" method="post">
				<mat-form-field appearance="outline" color="accent" class="w-full">
					<mat-label>Username</mat-label>
					<input type="text" required matInput name="user_name" formControlName="user_name">
				</mat-form-field>
				<mat-form-field appearance="outline" color="accent" class="w-full">
					<mat-label>Email</mat-label>
					<input type="email" required matInput name="email" formControlName="email">
				</mat-form-field>
				<mat-form-field appearance="outline" color="accent" class="w-full">
					<mat-label>Country</mat-label>
					<mat-select required name="country" formControlName="country">
						<mat-option *ngFor="let country of countries" [value]="country">{{ country.getName() }}</mat-option>
					</mat-select>
				</mat-form-field>
				<mat-form-field appearance="outline" color="accent" class="w-full">
					<mat-label>Phone Number</mat-label>
					<input type="text" required matInput name="phone" formControlName="phone">
				</mat-form-field>
				<mat-form-field appearance="outline" color="accent" class="w-full">
					<mat-label>Password</mat-label>
					<input type="password" required matInput name="password" formControlName="password">
				</mat-form-field>
				<button type="submit" mat-flat-button color="accent" class="w-full">Registro</button>
			</form>
			<button mat-button color="primary" class="w-full" routerLink="/login">Iniciar sesion</button>
		</mat-card-content>
	</mat-card>
</div>
