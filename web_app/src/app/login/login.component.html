<div class="min-h-screen flex items-center justify-center bg-gray-100">
	<mat-card class="w-full max-w-md p-6 bg-white rounded-lg shadow-lg">
		<mat-card-header class="mb-4">
			<mat-card-title class="text-2xl font-bold" i18n>Login</mat-card-title>
		</mat-card-header>
		<mat-card-content>
			<form [formGroup]="form" (ngSubmit)="submit()" method="post">
				<mat-form-field appearance="outline" color="accent" class="w-full">
					<mat-label i18n>Email or phone</mat-label>
					<input type="text" required matInput name="user" formControlName="user">
				</mat-form-field>
				<mat-form-field appearance="outline" color="accent" class="w-full">
					<mat-label>Password</mat-label>
					<input type="password" required matInput name="password" formControlName="password">
				</mat-form-field>
				<button type="submit" mat-flat-button color="accent" class="w-full">Login</button>
			</form>
			<button mat-button color="primary" class="w-full" routerLink="/register">Register</button>
		</mat-card-content>
	</mat-card>
</div>
